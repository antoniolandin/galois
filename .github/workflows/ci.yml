name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint y typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Frontend ----
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript
        working-directory: frontend
        run: npx tsc -b

      # ---- Backend ----
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar dependencias Python
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

  test:
    name: Tests del backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar GAP y librerias necesarias
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gap \
            gap-transgrp \
            gap-smallgrp \
            gap-primgrp \
            gap-table-of-marks

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sincronizar dependencias Python
        run: uv sync --frozen

      - name: Pytest
        run: uv run pytest

  docker-build:
    name: Build de la imagen Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (sin push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
